- name: Build yt-dlp (armeabi-v7a)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/output \
            python:3.11-slim bash -c "
              set -e
              echo '==> apt'
              apt-get update -qq
              apt-get install -y -qq binutils file gcc

              echo '==> upgrade pip'
              pip install --upgrade pip

              echo '==> install pyinstaller'
              pip install pyinstaller

              echo '==> install yt-dlp'
              pip install yt-dlp

              echo '==> create entrypoint'
              echo 'from yt_dlp import main' > /tmp/main.py
              echo 'if __name__ == \"__main__\": main()' >> /tmp/main.py

              echo '==> pyinstaller'
              pyinstaller \
                --onefile \
                --clean \
                --strip \
                --name yt-dlp-armeabi-v7a \
                --collect-all yt_dlp \
                /tmp/main.py

              echo '==> dist contents'
              ls -lh /dist/

              echo '==> copy'
              cp /dist/yt-dlp-armeabi-v7a /output/
              echo '==> done'
            "
