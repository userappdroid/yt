name: Build yt-dlp Android Binaries

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build yt-dlp (arm64-v8a)
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/output \
            python:3.11-slim bash -c "
              set -e
              apt-get update -qq
              apt-get install -y -qq binutils file
              pip install --upgrade pip
              pip install pyinstaller
              pip install yt-dlp
              echo 'from yt_dlp import main' > /tmp/main.py
              echo 'if __name__ == \"__main__\": main()' >> /tmp/main.py
              pyinstaller \
                --onefile \
                --clean \
                --strip \
                --name yt-dlp-arm64-v8a \
                --collect-all yt_dlp \
                /tmp/main.py
              cp /dist/yt-dlp-arm64-v8a /output/
            "

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-arm64-v8a
          path: yt-dlp-arm64-v8a
          retention-days: 90

  build-armv7:
    runs-on: ubuntu-latest
    needs: build-arm64
    timeout-minutes: 60
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build yt-dlp (armeabi-v7a)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/output \
            python:3.11-slim bash -c "
              set -e
              echo '==> apt'
              apt-get update -qq
              apt-get install -y -qq binutils file gcc
              echo '==> upgrade pip'
              pip install --upgrade pip
              echo '==> install pyinstaller'
              pip install pyinstaller
              echo '==> install yt-dlp'
              pip install yt-dlp
              echo '==> create entrypoint'
              echo 'from yt_dlp import main' > /tmp/main.py
              echo 'if __name__ == \"__main__\": main()' >> /tmp/main.py
              echo '==> pyinstaller'
              pyinstaller \
                --onefile \
                --clean \
                --strip \
                --name yt-dlp-armeabi-v7a \
                --collect-all yt_dlp \
                /tmp/main.py
              echo '==> dist contents'
              ls -lh /dist/
              echo '==> copy'
              cp /dist/yt-dlp-armeabi-v7a /output/
              echo '==> done'
            "

      - name: Upload armv7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-armeabi-v7a
          path: yt-dlp-armeabi-v7a
          retention-days: 90

  release:
    needs: [build-arm64, build-armv7]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "yt-dlp Android - Build #${{ github.run_number }}"
          files: |
            yt-dlp-arm64-v8a
            yt-dlp-armeabi-v7a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
