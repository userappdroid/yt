name: Build yt-dlp Android Binaries

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [armeabi-v7a]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip build-essential

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip
          pip install nuitka yt-dlp

      - name: Build yt-dlp for Android
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --lto=yes \
            --output-filename=yt-dlp-${{ matrix.abi }} \
            -m yt_dlp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-${{ matrix.abi }}
          path: yt-dlp-${{ matrix.abi }}
