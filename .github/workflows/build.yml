name: Build yt-dlp Android Binaries

on:
  workflow_dispatch:        # manual trigger button
  schedule:
    - cron: "0 0 * * 1"    # auto-rebuild every Monda

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            platform: linux/arm64
          - abi: armeabi-v7a
            platform: linux/arm/v7

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build yt-dlp (${{ matrix.abi }})
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/output \
            python:3.11-slim bash -c "
              apt-get update -qq && apt-get install -y -qq binutils upx 2>/dev/null
              pip install --quiet pyinstaller yt-dlp

              cat > /tmp/main.py << 'EOF'
              from yt_dlp import main
              if __name__ == '__main__':
                  main()
              EOF

              pyinstaller \
                --onefile \
                --clean \
                --strip \
                --name yt-dlp-${{ matrix.abi }} \
                --collect-all yt_dlp \
                /tmp/main.py

              # Compress with UPX to reduce size
              upx --best /dist/yt-dlp-${{ matrix.abi }} || true

              cp /dist/yt-dlp-${{ matrix.abi }} /output/
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-${{ matrix.abi }}
          path: yt-dlp-${{ matrix.abi }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "yt-dlp Android — Build #${{ github.run_number }}"
          files: |
            yt-dlp-arm64-v8a
            yt-dlp-armeabi-v7a
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

## 3. Enable workflow permissions

Go to your repo → **Settings** → **Actions** → **General** → scroll to **Workflow permissions** → select **Read and write permissions** → Save.

---

## 4. Run it

Go to your repo → **Actions** tab → click **Build yt-dlp Android Binaries** → click **Run workflow** → **Run workflow**.

It will take ~10–20 minutes. When done:

- Go to **Releases** in your repo
- You'll see both binaries ready to download:
  - `yt-dlp-arm64-v8a`
  - `yt-dlp-armeabi-v7a`

---

## 5. Use in your Android app

Download both from your releases page and drop them into:
```
src/main/assets/yt-dlp-arm64-v8a
src/main/assets/yt-dlp-armeabi-v7a
