name: Build yt-dlp armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build-armv7:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build yt-dlp (armeabi-v7a)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/output \
            python:3.10-slim bash -c "
              set -e
              echo '==> apt'
              apt-get update -qq
              apt-get install -y -qq binutils file gcc g++ make zlib1g-dev patchelf

              echo '==> upgrade pip'
              pip install --upgrade pip setuptools wheel

              echo '==> install pyinstaller from source'
              pip install pyinstaller==5.13.2

              echo '==> install yt-dlp'
              pip install yt-dlp

              echo '==> create entrypoint'
              echo 'from yt_dlp import main' > /tmp/main.py
              echo 'if __name__ == \"__main__\": main()' >> /tmp/main.py

              echo '==> pyinstaller'
              pyinstaller \
                --onefile \
                --clean \
                --strip \
                --name yt-dlp-armeabi-v7a \
                --collect-all yt_dlp \
                /tmp/main.py

              echo '==> dist contents'
              ls -lh /dist/

              echo '==> copy'
              cp /dist/yt-dlp-armeabi-v7a /output/
              echo '==> done'
            "

      - name: Upload armv7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-armeabi-v7a
          path: yt-dlp-armeabi-v7a
          retention-days: 90

  release:
    needs: build-armv7
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-armv7-${{ github.run_number }}
          name: "yt-dlp armeabi-v7a - Build #${{ github.run_number }}"
          files: yt-dlp-armeabi-v7a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
